<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Stress Analytics | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --amber: #d29922;
            --red: #f85149;
            --empty: #21262d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        /* Heatmap Grid */
        .heatmap-container {
            display: inline-grid;
            grid-template-rows: repeat(7, 14px);
            grid-auto-flow: column;
            gap: 4px;
        }

        .day-node {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            background: var(--empty);
            transition: transform 0.1s;
        }

        .day-node:hover {
            transform: scale(1.4);
            outline: 1px solid white;
            z-index: 50;
        }

        #chart-tooltip {
            position: fixed;
            display: none;
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 1000;
            border: 1px solid var(--border);
            pointer-events: none;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-amber-500 font-bold animate-pulse text-sm">Syncing with Google Sheets...</p>
    </div>

    <!-- Tooltip -->
    <div id="chart-tooltip"></div>

    <div class="max-w-[1400px] mx-auto p-6 space-y-6">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-black text-white flex items-center gap-3">
                    Heat Stress Analytics
                    <span id="sync-indicator" class="hidden px-2 py-0.5 bg-green-600/20 text-green-500 border border-green-500/40 text-[10px] rounded font-black uppercase">Live Sync</span>
                </h1>
                <p class="text-gray-400 text-sm">Automated monitoring via Google Sheets</p>
            </div>
            <div class="flex items-center gap-3">
                <select id="year-filter" onchange="updateUI()" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-4 py-2 focus:ring-amber-500 focus:border-amber-500">
                </select>
                <div id="last-updated" class="text-[10px] text-gray-500 font-mono bg-gray-800/50 px-3 py-2 rounded-lg border border-gray-700"></div>
            </div>
        </div>

        <!-- Main Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="card border-amber-500/40 bg-amber-500/5">
                <p class="text-[10px] text-amber-400 uppercase font-black tracking-widest mb-1">Warning Events</p>
                <p id="stat-total-events" class="text-4xl font-black text-amber-500">—</p>
            </div>
            <div class="card border-red-500/40 bg-red-500/5">
                <p class="text-[10px] text-red-400 uppercase font-black tracking-widest mb-1">Red Alerts</p>
                <p id="stat-red-count" class="text-4xl font-black text-red-500">—</p>
            </div>
            <div class="card">
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Max Duration (24h)</p>
                <p id="stat-max-hours" class="text-4xl font-black text-white">—</p>
            </div>
            <div class="card">
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Warning Days</p>
                <p id="stat-warn-days" class="text-4xl font-black text-white">—</p>
            </div>
        </div>

        <!-- Heatmap Section -->
        <div class="card overflow-hidden">
            <h3 class="text-xs font-bold uppercase text-gray-500 mb-4 tracking-tighter">Annual Intensity Distribution</h3>
            <div class="overflow-x-auto pb-4">
                <div id="heatmap" class="heatmap-container"></div>
            </div>
            <div class="flex gap-4 mt-2 text-[10px] text-gray-500">
                <div class="flex items-center gap-1"><div class="w-2 h-2 bg-[#21262d] rounded-sm"></div> Clear</div>
                <div class="flex items-center gap-1"><div class="w-2 h-2 bg-[#3e2c00] rounded-sm"></div> Low Warning</div>
                <div class="flex items-center gap-1"><div class="w-2 h-2 bg-[#d29922] rounded-sm"></div> Amber</div>
                <div class="flex items-center gap-1"><div class="w-2 h-2 bg-[#f85149] rounded-sm"></div> Red</div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card">
                <div class="h-80"><canvas id="lineChart"></canvas></div>
            </div>
            <div class="card">
                <div class="h-80"><canvas id="barChart"></canvas></div>
            </div>
        </div>

    </div>

    <script>
        // 1. Paste your Google Web App URL here
const API_URL = "https://script.google.com/macros/s/AKfycbzGFODMgqPus3jTCbEPFJdZkvp4Waz4jxwO_MzrV62P5uHc5c_S2QRncNNZAkyH6fT9/exec"; 

let dailyData = [];
let warnData = [];
let charts = {};

// This is the "missing tool" that caused your error
function formatApiData(rawRows) {
    if (!rawRows || rawRows.length < 2) return [];
    const headers = rawRows[0];
    return rawRows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, i) => {
            let v = row[i];
            obj[h] = (v !== "" && !isNaN(v) && v !== null) ? Number(v) : v;
        });
        return obj;
    });
}

async function initSync() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        // Use the tool to clean the data
        dailyData = formatApiData(data.daily);
        warnData = formatApiData(data.warnings);

        if (dailyData.length > 0) {
            setupYearFilter();
            updateUI();
            document.getElementById('sync-indicator')?.classList.remove('hidden');
            const lastUpdatedEl = document.getElementById('last-updated');
            if (lastUpdatedEl) lastUpdatedEl.innerText = `SYNCED: ${new Date().toLocaleTimeString()}`;
        }
    } catch (e) {
        console.error("API Sync Error:", e);
        alert("Connection failed. Check if your Google App Script is deployed to 'Anyone'.");
    } finally {
        document.getElementById('loader').classList.add('hidden');
    }
}

// Keep your existing setupYearFilter, updateUI, renderStats, etc. below this line...
window.onload = initSync;
    </script>
</body>
</html>
