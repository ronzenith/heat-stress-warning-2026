<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Stress Analytics | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --amber: #d29922;
            --red: #f85149;
            --empty: #21262d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        /* Heatmap Grid */
        .heatmap-container {
            display: inline-grid;
            grid-template-rows: repeat(7, 14px);
            grid-auto-flow: column;
            gap: 4px;
        }

        .day-node {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            background: var(--empty);
            transition: transform 0.1s;
        }

        .day-node:hover {
            transform: scale(1.4);
            outline: 1px solid white;
            z-index: 50;
        }

        #chart-tooltip {
            position: fixed;
            display: none;
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 1000;
            border: 1px solid var(--border);
            pointer-events: none;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-amber-500 font-bold animate-pulse text-sm">Syncing with Google Sheets...</p>
    </div>

    <!-- Tooltip -->
    <div id="chart-tooltip"></div>

    <div class="max-w-[1400px] mx-auto p-6 space-y-6">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-black text-white flex items-center gap-3">
                    Heat Stress Analytics
                    <span id="sync-indicator" class="hidden px-2 py-0.5 bg-green-600/20 text-green-500 border border-green-500/40 text-[10px] rounded font-black uppercase">Live Sync</span>
                </h1>
                <p class="text-gray-400 text-sm">Automated monitoring via Google Sheets</p>
            </div>
            <div class="flex items-center gap-3">
                <select id="year-filter" onchange="updateUI()" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-4 py-2 focus:ring-amber-500 focus:border-amber-500">
                </select>
                <div id="last-updated" class="text-[10px] text-gray-500 font-mono bg-gray-800/50 px-3 py-2 rounded-lg border border-gray-700"></div>
            </div>
        </div>

        <!-- Main Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="card border-amber-500/40 bg-amber-500/5">
                <p class="text-[10px] text-amber-400 uppercase font-black tracking-widest mb-1">Warning Events</p>
                <p id="stat-total-events" class="text-4xl font-black text-amber-500">—</p>
            </div>
            <div class="card border-red-500/40 bg-red-500/5">
                <p class="text-[10px] text-red-400 uppercase font-black tracking-widest mb-1">Red Alerts</p>
                <p id="stat-red-count" class="text-4xl font-black text-red-500">—</p>
            </div>
            <div class="card">
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Max Duration (24h)</p>
                <p id="stat-max-hours" class="text-4xl font-black text-white">—</p>
            </div>
            <div class="card">
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Warning Days</p>
                <p id="stat-warn-days" class="text-4xl font-black text-white">—</p>
            </div>
        </div>

        <!-- Heatmap Section -->
        <div class="card overflow-hidden">
            <h3 class="text-xs font-bold uppercase text-gray-500 mb-4 tracking-tighter">Annual Intensity Distribution</h3>
            <div class="overflow-x-auto pb-4">
                <div id="heatmap" class="heatmap-container"></div>
            </div>
            <div class="flex gap-4 mt-2 text-[10px] text-gray-500">
                <div class="flex items-center gap-1"><div class="w-2 h-2 bg-[#21262d] rounded-sm"></div> Clear</div>
                <div class="flex items-center gap-1"><div class="w-2 h-2 bg-[#3e2c00] rounded-sm"></div> Low Warning</div>
                <div class="flex items-center gap-1"><div class="w-2 h-2 bg-[#d29922] rounded-sm"></div> Amber</div>
                <div class="flex items-center gap-1"><div class="w-2 h-2 bg-[#f85149] rounded-sm"></div> Red</div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card">
                <div class="h-80"><canvas id="lineChart"></canvas></div>
            </div>
            <div class="card">
                <div class="h-80"><canvas id="barChart"></canvas></div>
            </div>
        </div>

    </div>

    <script>
        // Replace this with your new Web App URL from Step 2
const API_URL = "https://script.google.com/macros/s/AKfycbx9r_26BbGv6KFKjIi0jNp4vBgc-oHU6Or7EMwlS4abgF1-_p7Lp4uHw9mjFFfXEwWN/exec";

async function initSync() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json(); // The API sends clean data immediately
        
        // This maps the API data to your dashboard
        dailyData = formatApiData(data.daily);
        warnData = formatApiData(data.warnings);
        
        updateUI();
        document.getElementById('loader').classList.add('hidden');
    } catch (e) {
        console.error("API Sync Error:", e);
    }
}
        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            return lines.slice(1).map(line => {
                const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                headers.forEach((h, i) => {
                    let v = (values[i] || "").trim().replace(/^"|"$/g, '');
                    obj[h] = (v !== "" && !isNaN(v)) ? Number(v) : v;
                });
                return obj;
            });
        }

        function setupYearFilter() {
            const years = [...new Set(dailyData.map(d => d['Season Year']))].filter(y => y).sort((a,b) => b-a);
            const select = document.getElementById('year-filter');
            years.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y; opt.innerText = y;
                select.appendChild(opt);
            });
        }

        function updateUI() {
            const year = Number(document.getElementById('year-filter').value);
            const filteredDaily = dailyData.filter(d => d['Season Year'] === year);
            const filteredWarns = warnData.filter(w => {
                // Filter warnings that start in the selected year
                return new Date(w['Start Date']).getFullYear() === year;
            });

            renderStats(filteredDaily, filteredWarns);
            renderHeatmap(filteredDaily);
            renderCharts(filteredDaily, filteredWarns, year);
        }

        function renderStats(daily, warns) {
            document.getElementById('stat-total-events').innerText = warns.length;
            document.getElementById('stat-red-count').innerText = warns.filter(w => w.Color === 'Red').length;
            const max = Math.max(...daily.map(d => d['Warning Hours'] || 0));
            document.getElementById('stat-max-hours').innerText = max.toFixed(1) + 'h';
            document.getElementById('stat-warn-days').innerText = daily.filter(d => d['Warning Hours'] > 0).length;
        }

        function renderHeatmap(data) {
            const el = document.getElementById('heatmap');
            el.innerHTML = '';
            
            data.forEach(d => {
                const node = document.createElement('div');
                node.className = 'day-node';
                const h = d['Warning Hours'] || 0;
                
                if (h > 0) {
                    if (d['Worst Color'] === 'Red') node.style.background = 'var(--red)';
                    else if (h > 4) node.style.background = 'var(--amber)';
                    else node.style.background = '#3e2c00';
                }

                node.onmouseenter = (e) => {
                    const t = document.getElementById('chart-tooltip');
                    t.style.display = 'block';
                    t.style.left = (e.pageX + 10) + 'px';
                    t.style.top = (e.pageY - 20) + 'px';
                    t.innerHTML = `<strong>${d['Month Name']} ${d.Day}</strong><br>${h.toFixed(2)} Hours Warning`;
                };
                node.onmouseleave = () => document.getElementById('chart-tooltip').style.display = 'none';
                
                el.appendChild(node);
            });
        }

        function renderCharts(daily, warns, year) {
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const monthlyHours = months.map(m => {
                return daily.filter(d => d['Month Name'] === m).reduce((sum, d) => sum + (d['Warning Hours'] || 0), 0);
            });

            // Line Chart
            const ctx1 = document.getElementById('lineChart').getContext('2d');
            if (charts.line) charts.line.destroy();
            charts.line = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Total Warning Hours',
                        data: monthlyHours,
                        borderColor: '#d29922',
                        backgroundColor: '#d2992220',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        title: { display: true, text: `Monthly Warning Accumulation (${year})`, color: '#fff' }
                    },
                    scales: {
                        y: { grid: { color: '#ffffff10' }, ticks: { color: '#8b949e' } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                    }
                }
            });

            // Bar Chart (Duration Histogram)
            const ctx2 = document.getElementById('barChart').getContext('2d');
            if (charts.bar) charts.bar.destroy();
            const ranges = ['0-2h', '2-4h', '4-6h', '6h+'];
            const histData = [0, 0, 0, 0];
            warns.forEach(w => {
                const dur = w['Duration (hours)'];
                if (dur <= 2) histData[0]++;
                else if (dur <= 4) histData[1]++;
                else if (dur <= 6) histData[2]++;
                else histData[3]++;
            });

            charts.bar = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ranges,
                    datasets: [{
                        data: histData,
                        backgroundColor: '#f8514980',
                        borderColor: '#f85149',
                        borderWidth: 1
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        title: { display: true, text: 'Warning Duration Frequency', color: '#fff' }
                    },
                    scales: {
                        y: { grid: { color: '#ffffff10' }, ticks: { color: '#8b949e', stepSize: 1 } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                    }
                }
            });
        }

        window.onload = initSync;
    </script>
</body>
</html>
